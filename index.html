<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <button id="theme-toggle">🌓 Toggle Dark Mode</button>

    <div class="dashboard-container">
      <section class="card greeting-section">
        <h1 id="time-display">00:00:00</h1>
        <p id="date-display">Day, Month DD, YYYY</p>
        <h2 id="greeting-message">Good Morning</h2>
      </section>

      <div class="grid-layout">
        <section class="card timer-section">
          <h3>Focus Timer</h3>
          <div class="timer-display" id="timer">25:00</div>
          <div class="timer-controls">
            <button id="start-btn" class="btn primary">Start</button>
            <button id="stop-btn" class="btn secondary">Stop</button>
            <button id="reset-btn" class="btn danger">Reset</button>
          </div>
        </section>

        <section class="card tasks-section">
          <h3>Tasks</h3>
          <div class="input-group">
            <input type="text" id="task-input" placeholder="Add a new task..." />
            <button id="add-task-btn" class="btn primary">Add</button>
          </div>
          <ul id="task-list"></ul>
        </section>

        <section class="card links-section">
          <h3>Quick Links</h3>
          <div class="input-group multi-input">
            <input type="text" id="link-name" placeholder="Link name" />
            <input type="url" id="link-url" placeholder="URL (https://...)" />
            <button id="add-link-btn" class="btn primary">Add Link</button>
          </div>
          <div id="links-container" class="links-container"></div>
        </section>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
